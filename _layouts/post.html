---
layout: default
---
<div style="max-width: 740px; margin: 4rem auto; padding: 0 20px;">
  <div style="font-size: 13px; color: var(--text3); margin-bottom: 0.75rem;">
    Published on {{ page.date | date: "%B %d, %Y" }}
  </div>
  <h1 style="font-size: 36px; font-weight: 600; line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 2rem; color: var(--text1);">
    {{ page.title }}
  </h1>
  <div class="post-content" style="font-size: 16px; color: #2e2e2c; line-height: 1.8;">
    {{ content }}
  </div>
</div>
