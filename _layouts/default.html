<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ page.title }} | {{ site.title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white: #ffffff; --bg: #f5f5f4; --surface: #f9f9f8; --border: #e2e1dc; --border2: #d0cfc9;
    --text1: #1a1a18; --text2: #5c5b57; --text3: #9b9a96; --blue-bg: #e6f1fb; --blue-tx: #0c447c;
    --blue-md: #185fa5; --teal-bg: #e1f5ee; --teal-tx: #0f6e56; --amber-bg:#faeeda; --amber-tx:#854f0b;
    --coral-bg:#faece7; --coral-tx:#993c1d; --green-tx:#0f6e56; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  }
  body { font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text1); background: var(--bg); line-height: 1.6; }
  a { text-decoration: none; color: inherit; }
  
  /* Navigation Layout Styling */
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-logo { display: flex; align-items: baseline; gap: 6px; text-decoration: none; color: inherit; cursor: pointer; }
  .nav-logo-main { font-weight: 600; font-size: 15px; letter-spacing: 0.06em; }
  .nav-logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 0.14em; text-transform: uppercase; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  
  /* Clean Interactive Search Field */
  .search-container { position: relative; }
  .search-input { font-family: inherit; font-size: 13px; color: var(--text1); background: var(--surface); border: 1px solid var(--border); padding: 7px 12px 7px 32px; border-radius: var(--radius-md); outline: none; width: 160px; transition: all 0.2s ease; }
  .search-input:focus { width: 220px; border-color: var(--border2); background: var(--white); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 14px; pointer-events: none; }
  
  /* Floating Real-Time Search Dropdown */
  #search-results { position: absolute; top: 100%; right: 0; width: 320px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: 0 4px 16px rgba(0,0,0,0.08); max-height: 300px; overflow-y: auto; display: none; z-index: 1000; margin-top: 6px; padding: 4px 0; }
  
  .btn-cta { display: flex; align-items: center; gap: 6px; background: var(--text1); color: var(--white); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-md); border: none; cursor: pointer; white-space: nowrap; text-decoration: none; }
  .btn-cta:hover { background: #333330; }
  
  .footer { background: var(--white); border-top: 1px solid var(--border); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-top: 3rem; }
  .footer-brand { font-size: 13px; font-weight: 600; }
  .footer-tagline { font-size: 12px; color: var(--text3); max-width: 380px; }
  .footer-links { display: flex; gap: 1.5rem; align-items: center; font-size: 13px; color: var(--text2); }

  /* MOBILE RESPONSIVE DIALS FOR NAV & FOOTER */
  @media (max-width: 768px) {
    .nav { padding: 0 1rem; }
    .nav-logo-sub { display: none; } /* Hide sub-logo text to save row width */
    .search-input { width: 110px; padding-left: 28px; }
    .search-input:focus { width: 140px; }
    .search-icon { left: 9px; }
    .btn-text { display: none; } /* Convert CTA button to a clean utility icon on mobile */
    .btn-cta { padding: 8px 10px; }
    #search-results { width: 280px; }
    .footer { padding: 1.5rem 1rem; flex-direction: column; align-items: flex-start; gap: 1.25rem; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="{{ '/' | relative_url }}" class="nav-logo">
    <span class="nav-logo-main">SKETCHRONIX</span>
    <span class="nav-logo-sub">Insights</span>
  </a>
  <div class="nav-right">
    <div class="search-container">
      <i class="ti ti-search search-icon"></i>
      <input type="text" id="search-input" placeholder="Search..." class="search-input" autocomplete="off" />
      <div id="search-results"></div>
    </div>
    <a href="https://sketchronix.com/#builder" class="btn-cta">
      <i class="ti ti-file-certificate"></i> <span class="btn-text">Get Code-Compliant Drawings</span>
    </a>
  </div>
</nav>

{{ content }}

<footer class="footer">
  <div>
    <div class="footer-brand">Sketchronix Insights</div>
    <div class="footer-tagline">Technical design, structural drafting, and architectural layout strategies for modern practice.</div>
  </div>
  <div class="footer-links">
    <a href="#" style="color:var(--amber-tx); font-weight:500;"><i class="ti ti-rss"></i> RSS Feed</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</footer>

<script>
  const searchData = [
    {% for post in site.posts %}
    {
      title: {{ post.title | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      excerpt: {{ post.excerpt | strip_html | strip_newlines | truncatewords: 15 | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');

    if (!searchInput || !searchResults) return;

    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      searchResults.innerHTML = '';

      if (query.length < 2) {
        searchResults.style.display = 'none';
        return;
      }

      const matches = searchData.filter(post => 
        post.title.toLowerCase().includes(query) || 
        post.excerpt.toLowerCase().includes(query)
      );

      if (matches.length === 0) {
        searchResults.innerHTML = '<div style="padding: 10px 14px; font-size: 13px; color: var(--text3);">No results found</div>';
      } else {
        matches.forEach(post => {
          const item = document.createElement('a');
          item.href = post.url;
          item.style.display = 'block';
          item.style.padding = '10px 14px';
          item.style.borderBottom = '1px solid var(--border)';
          item.style.textDecoration = 'none';
          
          item.innerHTML = `
            <div style="font-weight: 600; font-size: 13px; color: var(--text1); line-height: 1.3;">\${post.title}</div>
            <div style="font-size: 11px; color: var(--text2); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">\${post.excerpt}</div>
          `;
          
          item.style.cursor = 'pointer';
          item.addEventListener('mouseenter', () => item.style.background = 'var(--surface)');
          item.addEventListener('mouseleave', () => item.style.background = 'none');
          
          searchResults.appendChild(item);
        });
        if (searchResults.lastChild) searchResults.lastChild.style.borderBottom = 'none';
      }

      searchResults.style.display = 'block';
    });

    document.addEventListener('click', function(e) {
      if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.style.display = 'none';
      }
    });
  });
</script>

</body>
</html>
